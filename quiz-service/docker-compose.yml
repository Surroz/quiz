
services:
  quiz-service:
    build: .
    environment:
      POSTGRES_USER: surro
      POSTGRES_PASSWORD: secret
      POSTGRES_URL: jdbc:postgresql://postgres:5432/quiz-service-db
    ports:
      - "8081:8080"
    networks:
      - s-network
    depends_on:
      - postgres
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: surro
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: quiz-service-db
    ports:
      - "5433:5432"
    networks:
      - s-network
    volumes:
      - postgres-quiz-data:/var/lib/postgresql

networks:
  s-network:
    driver: bridge
volumes:
  postgres-quiz-data: