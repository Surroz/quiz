
services:
  eureka-server:
    build: ./service-registry
    ports:
      - "8761:8761"
    networks:
      - quiz-network

  question-service:
    build: ./question-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true
      POSTGRES_USER: surro
      POSTGRES_PASSWORD: secret
      POSTGRES_URL: jdbc:postgresql://question-db:5432/question-service-db
    ports:
      - "8080:8080"
    networks:
      - quiz-network
    depends_on:
      - question-db
      - eureka-server
  question-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: surro
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: question-service-db
    ports:
      - "5433:5432"
    networks:
      - quiz-network
    volumes:
      - postgres-question-data:/var/lib/postgresql

  quiz-service:
    build: ./quiz-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true
      POSTGRES_USER: surro
      POSTGRES_PASSWORD: secret
      POSTGRES_URL: jdbc:postgresql://quiz-db:5432/quiz-service-db
    ports:
      - "8090:8080"
    networks:
      - quiz-network
    depends_on:
      - question-db
      - eureka-server
  quiz-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: surro
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: quiz-service-db
    ports:
      - "5434:5432"
    networks:
      - quiz-network
    volumes:
      - postgres-quiz-data:/var/lib/postgresql

networks:
  quiz-network:
    driver: bridge
volumes:
  postgres-question-data:
  postgres-quiz-data: